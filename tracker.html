<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenBite | My Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Unterseite.css">
    <link rel="stylesheet" href="mobile.css">
    <style>
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .calendar-day {
            background: var(--surface-dark);
            border: 1px solid var(--green-primary);
            padding: 15px;
            border-radius: 12px;
            min-height: 140px;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .calendar-day:hover {
            background: rgba(45, 106, 79, 0.2);
            border-color: var(--green-accent);
            transform: translateY(-3px);
        }
        .day-title { color: var(--green-accent); font-weight: bold; font-size: 1.1rem; margin-bottom: 10px; display: block; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px; }
        .cooked-entry { font-size: 0.85rem; background: rgba(27,67,50,0.5); color: var(--text-main); padding: 6px 10px; margin-top: 8px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--green-accent); }
        .delete-btn { color: var(--text-muted); cursor: pointer; font-weight: bold; margin-left: 8px; }
        .delete-btn:hover { color: #ff4d4d; }
        .add-area { margin-top: 40px; padding: 25px; background: var(--surface-dark); border-radius: 16px; border: 1px dashed var(--green-accent); }
        select#recipe-select { background: var(--bg-black); color: var(--text-main); border: 1px solid var(--green-primary); padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 15px; outline: none; }
        .hidden { display: none; }

        /* NUTRITION PANEL */
        .nutrition-panel { background: var(--surface-dark); border: 1px solid var(--green-primary); border-radius: 16px; padding: 25px 30px; margin-top: 40px; }
        .nutrition-header h3 { font-size: 1.3rem; margin-bottom: 4px; }
        .nutrition-subtitle { color: var(--text-muted); font-size: 0.82rem; margin-bottom: 18px; }
        .nutrition-alert { background: rgba(230,57,70,0.1); border-left: 3px solid #e63946; color: #f4a261; padding: 9px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 0.88rem; font-weight: 600; }
        .nutrient-bars { display: flex; flex-direction: column; gap: 16px; }
        .nutrient-row { display: flex; flex-direction: column; gap: 5px; }
        .nutrient-info { display: flex; justify-content: space-between; font-size: 0.88rem; }
        .nutrient-name { color: var(--text-main); font-weight: 500; }
        .nutrient-pct { font-weight: 700; }
        .nutrient-bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; }
        .nutrient-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }
        .nutrient-tip { font-size: 0.76rem; color: var(--text-muted); }
        .nutrient-tip em { color: var(--green-accent); font-style: normal; }
        .nutrition-good-section { margin-top: 20px; }
        .nutrition-good-title { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 8px; }
        .nutrition-good-pills { display: flex; flex-wrap: wrap; gap: 7px; }
        .good-pill { background: rgba(64,145,108,0.12); border: 1px solid var(--green-primary); color: var(--text-muted); padding: 3px 10px; border-radius: 20px; font-size: 0.76rem; }
        .good-pill b { color: #52b788; }
        .nutrition-empty { text-align: center; padding: 25px; color: var(--text-muted); font-size: 0.88rem; line-height: 1.7; }
    </style>
</head>
<body>
    <header id="main-header" class="scrolled">
        <h2 id="logo-text">GreenBite <span class="greeting">| My Tracker</span></h2>
        <div class="main-nav">
            <a href="rezepte.html"    class="logout-btn nav-btn" title="Find Recipes" style="text-decoration:none;">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l19-9-9 19-2-8-8-2z"/></svg>
                <span class="nav-label">Find Recipes</span>
            </a>
            <a href="tracker.html"    class="logout-btn nav-btn" title="My Tracking" style="text-decoration:none;">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 4-4"/></svg>
                <span class="nav-label">My Tracking</span>
            </a>
            <a href="collection.html" class="logout-btn nav-btn" title="My Collection" style="text-decoration:none;">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                <span class="nav-label">My Collection</span>
            </a>
            <a href="index.html"      class="logout-btn nav-btn" title="Home" style="text-decoration:none;">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span class="nav-label">Home</span>
            </a>
            <button class="logout-btn nav-btn" title="Logout" onclick="logout()">
                <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span class="nav-label">Logout</span>
            </button>
        </div>

    </header>

    <main class="page-content">
        <section class="recipes-section">
            <h1 class="section-title">My Tracking</h1>
            <p class="section-subtitle">Plan your meals and track your progress. Click on a day to add a recipe.</p>

            <div class="calendar-controls" style="display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:25px;">
                <button onclick="changeWeek(-1)" class="logout-btn">◀</button>
                <h2 id="current-week-display" style="min-width:250px;text-align:center;color:var(--green-accent);">Loading…</h2>
                <button onclick="changeWeek(1)"  class="logout-btn">▶</button>
            </div>

            <div id="calendar-grid" class="calendar-grid"></div>
        </section>

        <section class="nutrition-panel">
            <div id="nutrition-analysis">
                <div class="nutrition-empty"><p>Loading…</p></div>
            </div>
        </section>

        <section id="add-recipe-section" class="ingredient-section hidden">
            <h2 class="section-title">Add Recipe for <span id="selected-day-name" style="color:var(--green-accent);"></span></h2>
            <div class="search-container">
                <select id="recipe-select" style="width:100%;padding:15px;background:var(--bg-black);color:white;border:1px solid var(--green-primary);border-radius:8px;margin-bottom:15px;">
                </select>
                <div class="button-group">
                    <button class="logout-btn" onclick="saveToTracker()" style="background:var(--green-primary);">Save Recipe</button>
                    <button class="logout-btn" onclick="closeAddSection()" style="background:transparent;border:1px solid #444;">Cancel</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="auth.js"></script>
    <script src="rezepte-daten.js"></script>
    <script src="tracker.js"></script>
    <script>function logout() { signOutUser(); }</script>
</body>
</html>
