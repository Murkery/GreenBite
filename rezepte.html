<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenBite | Find Recipes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Unterseite.css">
    <link rel="stylesheet" href="mobile.css">
</head>
<body>
    <header id="main-header" class="scrolled">
        <h2 id="logo-text">GreenBite <span class="greeting">| Recipe Finder</span></h2>
        <div class="main-nav">
            <a href="tracker.html" class="logout-btn nav-btn" title="My Tracking" style="text-decoration:none;"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 4-4"/></svg><span class="nav-label">My Tracking</span></a>
            <a href="collection.html" class="logout-btn nav-btn" title="My Collection" style="text-decoration:none;"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span class="nav-label">My Collection</span></a>
            <a href="index.html" class="logout-btn nav-btn" title="Home" style="text-decoration:none;"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg><span class="nav-label">Home</span></a>
            <button class="logout-btn nav-btn" title="Logout" onclick="logout()"><svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg><span class="nav-label">Logout</span></button>
        </div>

    </header>

    <main class="page-content">
        <section class="ingredient-section">
            <h1 class="section-title">What's in your fridge?</h1>
            <p class="section-subtitle">Select the ingredients you have on hand.</p>

            <div class="search-container">
                <input type="text" id="ingredient-search" placeholder="Search for ingredients... (e.g. Tomato)">
            </div>

            <div style="text-align: center; margin-bottom: 15px;">
                <button id="select-all-btn" class="outline-btn" style="padding: 5px 15px; font-size: 0.9em;">Select All</button>
            </div>

            <div id="ingredients-grid" class="ingredients-grid"></div>

            <button id="toggle-more-btn" class="outline-btn">Show More Ingredients</button>
        </section>

        <section class="recipes-section">
            <h2 class="section-title">Matching Recipes</h2>
            <div id="recipe-grid" class="recipe-grid">
                <p id="recipe-placeholder">Select ingredients above to discover delicious meals...</p>
            </div>
        </section>
    </main>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="auth.js"></script>
    <script src="rezepte-daten.js"></script>
    <script src="collection.js"></script>
    <script src="rezepte.js"></script>
    <script>function logout() { signOutUser(); }</script>
</body>
</html>
