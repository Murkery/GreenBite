<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenBite | My Collection</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="Unterseite.css">
</head>
<body>
    <header id="main-header" class="scrolled">
        <h2 id="logo-text">GreenBite <span class="greeting">| My Collection</span></h2>
        <div>
            <a href="rezepte.html" class="logout-btn" style="text-decoration: none; margin-right: 10px;">Find Recipes</a>
            <a href="index.html" class="logout-btn" style="text-decoration: none; margin-right: 10px;">Home</a>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>

    <main class="page-content">
        <section class="recipes-section">
            <h1 class="section-title">Your favourites</h1>
            <p class="section-subtitle">Here you will find all the recipes you have marked with a heart.</p>
            
            <div id="collection-grid" class="recipe-grid">
                <p id="collection-placeholder">You have not saved any favourites yet.</p>
            </div>
        </section>
    </main>
    <script src="rezepte-daten.js"></script> <script src="collection.js"></script>
    <script src="rezepte-daten.js"></script>
    <script src="collection.js"></script>
    <script>
        // Logout Funktion (kopiert aus rezepte.js für Konsistenz)
        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('currentUser');
            window.location.href = "index.html";
        }

        // Funktion zum Ansehen der Details
        function goToDetail(id) {
            localStorage.setItem('selectedRecipeId', id);
            window.location.href = "details.html";
        }
    </script>
</body>
</html>
