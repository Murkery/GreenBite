<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenBite | Recipe Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    <style>
        /* Password wrapper mit Auge-Button */
        .pw-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .pw-wrapper input {
            width: 100%;
            padding-right: 44px;
        }
        .pw-toggle {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }
        .pw-toggle:hover { color: var(--green-accent); }
        /* Scroll hint */
        #scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }
        #scroll-hint.visible {
            opacity: 1;
        }
        #scroll-hint svg {
            animation: bounce 1.2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(6px); }
        }
    </style>
</head>

<body>
    <canvas id="bg-canvas" style="pointer-events:none;touch-action:none;"></canvas>

    <div id="auth-section">
        <h1 id="auth-title">Welcome Back</h1>
        <p class="subtitle" id="auth-subtitle">----------------</p>
        
        <div class="input-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter your username">
        </div>
        
        <div class="input-group">
            <label for="password">Password</label>
            <div class="pw-wrapper">
                <input type="password" id="password" placeholder="Enter your password">
                <button class="pw-toggle" type="button" onclick="togglePw('password', this)" tabindex="-1">
                    <svg id="eye-pw" viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Nur beim Registrieren sichtbar -->
        <div class="input-group" id="confirm-group" style="display:none;">
            <label for="password-confirm">Confirm Password</label>
            <div class="pw-wrapper">
                <input type="password" id="password-confirm" placeholder="Repeat your password">
                <button class="pw-toggle" type="button" onclick="togglePw('password-confirm', this)" tabindex="-1">
                    <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </button>
            </div>
        </div>

        <button id="auth-btn" onclick="handleAuth()">Login</button>
        <button class="guest-btn" onclick="continueAsGuest()">Continue as Guest</button>

        <p class="toggle-text">
            <span id="toggle-link" onclick="toggleAuthMode()">Don't have an account? Sign up</span>
        </p>
    </div>

    <div id="app-section" style="display: none;">
        <div id="hover-icon-container" style="pointer-events:none;touch-action:none;"></div>
        <header id="main-header">
            <h2 id="logo-text">GreenBite <span class="greeting">| Hello, <span id="display-name">Chef</span>!</span></h2>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </header>

        <section class="hero-spacer" style="position:relative;">
            <div id="scroll-hint">
                <svg viewBox="0 0 24 24" width="22" height="22" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                scroll down
            </div>
        </section>

        <div class="action-menu">
            <a href="rezepte.html"    class="menu-btn menu-link" id="btn-recipes" >Find Recipes</a>
            <a href="tracker.html"    class="menu-btn menu-link" id="btn-tracking">My Tracking</a>
            <a href="collection.html" class="menu-btn menu-link" id="btn-collect" >My Collection</a>
        </div>

        <main class="content-area"></main>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="auth.js"></script>
    <script src="script.js"></script>
    <script>
        // Passwort-Sichtbarkeit umschalten
        function togglePw(inputId, btn) {
            const inp = document.getElementById(inputId);
            const isHidden = inp.type === 'password';
            inp.type = isHidden ? 'text' : 'password';
            // Auge-Icon tauschen
            btn.innerHTML = isHidden
                ? `<svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"></line></svg>`
                : `<svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
        }
    </script>
    <script>
        // Scroll-hint: erscheint nach 5s Inaktivität, verschwindet beim Scrollen
        let scrollHintTimer = null;
        const scrollHint = document.getElementById('scroll-hint');

        function resetScrollHint() {
            scrollHint.classList.remove('visible');
            clearTimeout(scrollHintTimer);
            // Nur anzeigen wenn App-Section sichtbar und noch nicht runtergeschrollt
            if (document.getElementById('app-section').style.display !== 'none' && window.scrollY < 50) {
                scrollHintTimer = setTimeout(() => {
                    if (window.scrollY < 50) scrollHint.classList.add('visible');
                }, 5000);
            }
        }

        // Startet wenn Dashboard gezeigt wird
        const _origShowDashboard = window.showDashboard;
        document.addEventListener('DOMContentLoaded', () => {
            // Hook into startApp / showDashboard via MutationObserver on app-section
            const appSection = document.getElementById('app-section');
            new MutationObserver(() => {
                if (appSection.style.display !== 'none') resetScrollHint();
            }).observe(appSection, { attributes: true, attributeFilter: ['style'] });
        });

        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                scrollHint.classList.remove('visible');
                clearTimeout(scrollHintTimer);
            }
        });
        ['touchstart','mousemove','keydown'].forEach(e =>
            document.addEventListener(e, resetScrollHint, { passive: true })
        );
    </script>
</body>
</html>
